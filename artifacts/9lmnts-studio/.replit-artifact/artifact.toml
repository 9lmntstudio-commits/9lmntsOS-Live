kind = "web"
previewPath = "/"
title = "9LMNTS Studio"
version = "1.0.0"
id = "artifacts/9lmnts-studio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24200
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/9lmnts-studio run dev"

[services.env]
PORT = "24200"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/9lmnts-studio", "run", "build"]
publicDir = "artifacts/9lmnts-studio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
